[plugin]
id = "web_search"
name = "Web Search"
description = "Tavily / Baidu AppBuilder / DuckDuckGo search. Dual V1+V2 compatible."
short_description = "Search the internet for real-time information"
keywords = ["search", "web", "internet", "news", "lookup", "query", "tavily", "baidu"]
version = "1.0.0"
entry = "plugin.plugins.web_search:WebSearch"

[plugin.author]
name = "XM"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin_runtime]
enabled = true
auto_start = false

[plugin.store]
enabled = true

[plugin.database]
enabled = false

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "settings"
title = "Search Settings"
entry = "ui/settings.tsx"
context = "settings"
permissions = ["state:read", "action:call", "config:read", "config:write"]

[[plugin.ui.guide]]
id = "guide"
title = "User Guide"
entry = "docs/guide.md"
permissions = ["state:read"]

[settings]
max_results = 5
timeout = 15
baidu_api_key = ""
tavily_api_key = ""