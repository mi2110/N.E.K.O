<!DOCTYPE html>
<html lang="zh-CN" class="subtitle-window-host">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.E.K.O. Subtitle</title>
    <script src="/static/i18n-i18next.js"></script>
    <script src="/static/theme-manager.js"></script>
    <link rel="stylesheet" href="/static/css/subtitle.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
</head>
<body class="subtitle-window-host">
    <div id="subtitle-display" data-subtitle-panel-state="clean">
        <div id="subtitle-scroll">
            <span id="subtitle-text" data-subtitle-placeholder="暂无翻译内容"></span>
        </div>
        <div id="subtitle-panel-controls">
            <button type="button" id="subtitle-lock-btn" class="subtitle-panel-control-btn" title="锁定位置" aria-label="锁定位置" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="14" height="14" aria-hidden="true">
                    <path d="M7 10V7a5 5 0 0110 0v3h1a1 1 0 011 1v9a1 1 0 01-1 1H6a1 1 0 01-1-1v-9a1 1 0 011-1h1zm2 0h6V7a3 3 0 00-6 0v3z"/>
                </svg>
            </button>
            <button type="button" id="subtitle-settings-btn" class="subtitle-panel-control-btn" title="字幕设置" aria-label="字幕设置" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="14" height="14" aria-hidden="true">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z"/>
                </svg>
            </button>
            <button type="button" id="subtitle-close-btn" class="subtitle-panel-control-btn" title="关闭翻译面板" aria-label="关闭翻译面板">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" width="14" height="14" aria-hidden="true">
                    <path d="M6 6l12 12M18 6L6 18"/>
                </svg>
            </button>
        </div>
        <div id="subtitle-settings-panel" class="hidden">
            <div class="subtitle-settings-row">
                <label class="subtitle-settings-label" data-subtitle-label="targetLang" for="subtitle-lang-select"><span class="subtitle-settings-label-text">语言</span></label>
                <select id="subtitle-lang-select" title="语言">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ru">Русский</option>
                    <option value="es">Español</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <div class="subtitle-settings-row">
                <label class="subtitle-settings-label" data-subtitle-label="opacity" for="subtitle-opacity-slider"><span class="subtitle-settings-label-text">不透明度</span></label>
                <input type="range" id="subtitle-opacity-slider" min="0" max="100" value="95" title="不透明度">
                <span id="subtitle-opacity-value">95%</span>
            </div>
            <div class="subtitle-settings-row">
                <label class="subtitle-settings-label" data-subtitle-label="fontSize" for="subtitle-font-size-select"><span class="subtitle-settings-label-text">字体</span></label>
                <select id="subtitle-font-size-select" title="字体">
                    <option value="16" data-subtitle-font-size-label="fontSizeSmall">小号</option>
                    <option value="21" data-subtitle-font-size-label="fontSizeSmaller">较小</option>
                    <option value="26" data-subtitle-font-size-label="fontSizeDefault" selected>默认</option>
                    <option value="34" data-subtitle-font-size-label="fontSizeLarger">较大</option>
                    <option value="44" data-subtitle-font-size-label="fontSizeLarge">大号</option>
                </select>
            </div>
            <div class="subtitle-settings-row">
                <label class="subtitle-settings-label" data-subtitle-label="colorScheme" for="subtitle-color-scheme-select"><span class="subtitle-settings-label-text">配色</span></label>
                <select id="subtitle-color-scheme-select" title="配色">
                    <option value="default" data-subtitle-color-scheme-label="colorSchemeDefault">默认</option>
                    <option value="red" data-subtitle-color-scheme-label="colorSchemeRed">红</option>
                    <option value="orange" data-subtitle-color-scheme-label="colorSchemeOrange">橙</option>
                    <option value="yellow" data-subtitle-color-scheme-label="colorSchemeYellow">黄</option>
                    <option value="green" data-subtitle-color-scheme-label="colorSchemeGreen">绿</option>
                    <option value="blue" data-subtitle-color-scheme-label="colorSchemeBlue">蓝</option>
                    <option value="indigo" data-subtitle-color-scheme-label="colorSchemeIndigo">靛</option>
                    <option value="violet" data-subtitle-color-scheme-label="colorSchemeViolet">紫</option>
                </select>
            </div>
            <div class="subtitle-settings-row">
                <label class="subtitle-settings-label" data-subtitle-label="danmakuMode" for="subtitle-danmaku-mode-btn"><span class="subtitle-settings-label-text">弹幕模式</span></label>
                <label class="subtitle-settings-switch subtitle-danmaku-switch">
                    <input type="checkbox" id="subtitle-danmaku-mode-btn" title="弹幕模式" aria-label="弹幕模式">
                    <span class="subtitle-settings-track" aria-hidden="true"></span>
                </label>
            </div>
        </div>
        <div id="subtitle-resize-handles" aria-hidden="true">
            <span class="subtitle-resize-edge subtitle-resize-n" data-resize-dir="n"></span>
            <span class="subtitle-resize-edge subtitle-resize-e" data-resize-dir="e"></span>
            <span class="subtitle-resize-edge subtitle-resize-s" data-resize-dir="s"></span>
            <span class="subtitle-resize-edge subtitle-resize-w" data-resize-dir="w"></span>
            <span class="subtitle-resize-edge subtitle-resize-ne" data-resize-dir="ne"></span>
            <span class="subtitle-resize-edge subtitle-resize-se" data-resize-dir="se"></span>
            <span class="subtitle-resize-edge subtitle-resize-sw" data-resize-dir="sw"></span>
            <span class="subtitle-resize-edge subtitle-resize-nw" data-resize-dir="nw"></span>
        </div>
    </div>

    <script src="/static/subtitle/subtitle-shared.js"></script>
    <script src="/static/subtitle/subtitle-window.js"></script>
</body>
</html>
